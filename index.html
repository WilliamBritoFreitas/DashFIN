<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dash Financeiro</title>
  </head>
  <body>
    <h1>DashBoard Financeiro</h1>
    <!-- Resumo -->
    <section>
      <div>
        <h2>Entradas</h2>
        <p>R$ <span id="total_Entrada">0,00</span></p>
      </div>
        <div>
        <h2>Saídas</h2>
        <p>R$ <span id="total_Saida">0,00</span></p>
      </div
       <div>
        <h2>Saldo</h2>
        <p>R$ <span id="Saldo_Final">0,00</span></p>
       </div>
    </section>

    <!-- Entrada de dados -->
     <section>
        <div>
        <h2>Data</h2>
        <input type="Date">
      </div>
       <div>
        <h2>Descrição</h2>
        <input id="descicao" type="text">
      </div>
     </section>
  </body>
</html>
